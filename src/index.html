<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goit-js-hw-12</title>
  </head>
  <body>
    <main>
      <div class="container">
        <form class="form">
          <label>
            <input
              class="input"
              type="text"
              name="search-text"
              placeholder="Search images..."
              required
            />
          </label>
          <button class="btn" type="submit">Search</button>
        </form>
        <ul class="gallery"></ul>
        <div class="loader-wrap is-hidden">
          <span class="loader"></span>
        </div>
        <button type="button" class="btn load-more-btn is-hidden">
          Load more
        </button>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
